version: "2"
linters:
  default: standard
  enable:
    - revive
    - misspell
    - nolintlint
    - gocritic
  settings:
    lll:
      line-length: 120
    cyclop:
      max-complexity: 15
    revive:
      rules:
        - name: exported
          disabled: true
issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - gocritic
        - revive
