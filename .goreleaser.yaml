version: 2

before:
  hooks:
    - go mod tidy

builds:
  - binary: arielsurco-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/ArielSurco/cli/cmd.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE

checksum:
  name_template: "checksums.txt"

brews:
  - name: arielsurco-cli
    description: "Personal developer CLI with project navigation and TUI"
    homepage: "https://github.com/ArielSurco/cli"
    license: "MIT"
    directory: Formula
    install: |
      bin.install "arielsurco-cli"
    test: |
      system "#{bin}/arielsurco-cli", "--version"
    repository:
      owner: ArielSurco
      name: cli
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"

release:
  github:
    owner: ArielSurco
    name: cli
